<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAMEBOXD — Seu diário de jogos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:ital,wght@0,100..900;1,100..900&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --bg2: #0f1218;
    --bg3: #161b24;
    --bg4: #1e2535;
    --panel: #12161f;
    --border: #1f2a3a;
    --border2: #2a3850;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --gold: #ffd700;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f97316;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #475569;
    --glow: 0 0 20px rgba(0,212,255,0.3);
    --glow2: 0 0 20px rgba(124,58,237,0.3);
    --font-head: 'Rajdhani', sans-serif;
    --font-body: 'Exo 2', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Noise texture overlay */
  body::before {
    content:'';
    position:fixed;
    inset:0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events:none;
    z-index:9999;
    opacity:0.4;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ===== HEADER ===== */
  header {
    position: sticky; top:0; z-index:100;
    background: rgba(10,12,16,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
  }

  .logo {
    font-family: var(--font-head);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span {
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  nav { display:flex; gap:0.25rem; }

  nav button {
    background: none;
    border: none;
    color: var(--text2);
    font-family: var(--font-head);
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0.4rem 0.9rem;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    position: relative;
  }

  nav button::after {
    content:'';
    position:absolute;
    bottom:0; left:50%; transform:translateX(-50%);
    width:0; height:2px;
    background: var(--accent);
    transition: width 0.2s;
  }

  nav button:hover { color: var(--text); }
  nav button:hover::after { width:80%; }
  nav button.active { color: var(--accent); }
  nav button.active::after { width:80%; }

  .header-actions { display:flex; gap:0.5rem; align-items:center; }

  .btn-add {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    font-family: var(--font-head);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0.45rem 1.1rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 15px rgba(0,212,255,0.2);
  }

  .btn-add:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 25px rgba(0,212,255,0.4);
  }

  /* ===== PAGES ===== */
  .page { display:none; padding: 2rem; max-width: 1400px; margin: 0 auto; }
  .page.active { display:block; animation: fadeUp 0.4s ease; }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to { opacity:1; transform:translateY(0); }
  }

  /* ===== DASHBOARD ===== */
  .dash-hero {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .stat-card::before {
    content:'';
    position:absolute;
    top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .stat-card:hover { border-color: var(--border2); }

  .stat-card .label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 0.5rem;
  }

  .stat-card .value {
    font-family: var(--font-head);
    font-size: 2rem;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-card .sub {
    font-size: 0.75rem;
    color: var(--text3);
    margin-top: 0.3rem;
  }

  .stat-card .icon {
    position: absolute;
    right: 1rem; top: 50%;
    transform: translateY(-50%);
    font-size: 2.5rem;
    opacity: 0.06;
  }

  .dash-grid {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .section-title {
    font-family: var(--font-head);
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .section-title::after {
    content:'';
    flex:1;
    height:1px;
    background: var(--border);
  }

  /* ===== GAME CARDS ===== */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1.25rem;
  }

  .game-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }

  .game-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 30px rgba(0,212,255,0.15);
  }

  .game-card .cover {
    width:100%; aspect-ratio: 16/9;
    background: var(--bg3);
    display: flex; align-items:center; justify-content:center;
    font-size: 3rem;
    position: relative;
    overflow: hidden;
  }

  .game-card .cover img {
    width:100%; height:100%; object-fit:cover;
    transition: transform 0.3s;
  }

  .game-card:hover .cover img { transform: scale(1.05); }

  .game-card .cover-fallback {
    width:100%; height:100%;
    background: linear-gradient(135deg, var(--bg3), var(--bg4));
    display:flex; align-items:center; justify-content:center;
    font-size:2.5rem;
  }

  .game-card .info { padding: 0.85rem; }

  .game-card .title {
    font-family: var(--font-head);
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 0.4rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .game-card .meta {
    display:flex; justify-content:space-between;
    align-items:center;
    font-size: 0.75rem;
    color: var(--text3);
    margin-bottom: 0.5rem;
  }

  .stars-display {
    display: flex;
    gap: 1px;
    align-items: center;
  }

  .stars-display .star {
    color: var(--text3);
    font-size: 0.75rem;
    transition: color 0.1s;
  }

  .stars-display .star.filled { color: var(--gold); }
  .stars-display .star.half { color: var(--gold); opacity: 0.6; }

  .completion-bar-wrap {
    position: relative;
    margin-top: 0.4rem;
  }

  .completion-bar-bg {
    height: 4px;
    background: var(--bg3);
    border-radius: 2px;
    overflow: hidden;
  }

  .completion-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.6s ease;
  }

  .completion-label {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    color: var(--text3);
    position: absolute;
    right:0; top:-14px;
  }

  .badge-status {
    position: absolute;
    top: 0.5rem; right: 0.5rem;
    font-family: var(--font-mono);
    font-size: 0.55rem;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 2px 6px;
    border-radius: 3px;
  }

  .badge-completed { background: rgba(34,197,94,0.2); color: var(--green); border:1px solid rgba(34,197,94,0.3); }
  .badge-playing { background: rgba(0,212,255,0.15); color: var(--accent); border:1px solid rgba(0,212,255,0.3); }
  .badge-dropped { background: rgba(239,68,68,0.15); color: var(--red); border:1px solid rgba(239,68,68,0.3); }

  /* ===== MODAL ===== */
  .modal-overlay {
    display:none;
    position:fixed; inset:0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(8px);
    z-index: 500;
    align-items:center; justify-content:center;
  }

  .modal-overlay.open { display:flex; animation: fadeIn 0.2s; }

  @keyframes fadeIn { from{opacity:0} to{opacity:1} }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    width: 90%; max-width: 680px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 25px 60px rgba(0,0,0,0.6), 0 0 60px rgba(0,212,255,0.05);
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { transform:translateY(30px); opacity:0; }
    to { transform:translateY(0); opacity:1; }
  }

  .modal-header {
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
  }

  .modal-title {
    font-family: var(--font-head);
    font-size: 1.2rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
  }

  .modal-close {
    background:none; border:none;
    color: var(--text3);
    font-size: 1.4rem;
    cursor:pointer;
    transition: color 0.2s;
    line-height:1;
  }

  .modal-close:hover { color: var(--red); }

  .modal-body { padding: 1.5rem; }

  /* Form */
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1rem; }
  .form-col { display:flex; flex-direction:column; gap:0.4rem; }

  label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 2px;
  }

  input[type=text], input[type=number], select, textarea {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font-body);
    font-size: 0.9rem;
    padding: 0.6rem 0.8rem;
    transition: border-color 0.2s;
    outline: none;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,212,255,0.1);
  }

  select option { background: var(--bg3); }

  textarea { resize:vertical; min-height:80px; }

  /* Star rating input */
  .star-rating-input {
    display:flex; gap:4px;
    align-items:center;
    padding: 0.4rem 0;
  }

  .star-rating-input .star-btn {
    background:none; border:none;
    font-size: 1.4rem;
    cursor:pointer;
    color: var(--text3);
    transition: all 0.1s;
    line-height:1;
    padding: 0 1px;
  }

  .star-rating-input .star-btn.active { color: var(--gold); transform: scale(1.1); }
  .star-rating-input .star-btn:hover { color: var(--gold); }

  .rating-val {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--accent);
    margin-left: 0.5rem;
    min-width: 30px;
  }

  .form-actions {
    display:flex; gap:0.75rem; justify-content:flex-end;
    margin-top:1.5rem; padding-top:1rem;
    border-top: 1px solid var(--border);
  }

  .btn {
    font-family: var(--font-head);
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 0.55rem 1.4rem;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 0 15px rgba(0,212,255,0.2);
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 25px rgba(0,212,255,0.4);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

  .btn-danger {
    background: rgba(239,68,68,0.15);
    color: var(--red);
    border: 1px solid rgba(239,68,68,0.3);
  }

  .btn-danger:hover { background: rgba(239,68,68,0.25); }

  /* ===== SEARCH RESULT ===== */
  .steam-result {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1rem;
    display:flex; gap:1rem; align-items:flex-start;
  }

  .steam-result img {
    width:80px; border-radius:4px;
    flex-shrink:0;
  }

  .steam-result .sr-title {
    font-family: var(--font-head);
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
  }

  .steam-result .sr-meta {
    font-size: 0.75rem;
    color: var(--text2);
    line-height: 1.6;
  }

  .steam-result .sr-tags {
    display:flex; flex-wrap:wrap; gap:4px; margin-top:0.4rem;
  }

  .tag {
    font-family: var(--font-mono);
    font-size: 0.6rem;
    padding: 2px 7px;
    border-radius: 3px;
    background: rgba(124,58,237,0.2);
    color: #a78bfa;
    border: 1px solid rgba(124,58,237,0.3);
  }

  /* ===== RANKING LIST ===== */
  .rank-list { display:flex; flex-direction:column; gap:0.75rem; }

  .rank-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.9rem 1.2rem;
    display:grid;
    grid-template-columns: 2.5rem 3rem 1fr auto auto;
    gap: 1rem;
    align-items:center;
    cursor:pointer;
    transition: all 0.2s;
  }

  .rank-item:hover { border-color: var(--border2); background: var(--bg3); }

  .rank-num {
    font-family: var(--font-mono);
    font-size: 1.1rem;
    font-weight: 500;
    color: var(--text3);
    text-align:center;
  }

  .rank-item.top-1 .rank-num { color: var(--gold); font-size:1.3rem; }
  .rank-item.top-2 .rank-num { color: #c0c0c0; }
  .rank-item.top-3 .rank-num { color: #cd7f32; }

  .rank-cover {
    width: 3rem; height: 1.7rem;
    border-radius: 3px; overflow:hidden;
    background: var(--bg3);
    flex-shrink:0;
  }

  .rank-cover img { width:100%; height:100%; object-fit:cover; }

  .rank-info .name {
    font-family: var(--font-head);
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--text);
  }

  .rank-info .cat {
    font-size: 0.72rem;
    color: var(--text3);
    margin-top:2px;
  }

  .rank-score {
    font-family: var(--font-head);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--gold);
    text-align:center;
    min-width:50px;
  }

  .rank-hours {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--text3);
    text-align:right;
    white-space:nowrap;
  }

  /* ===== STATS ===== */
  .stats-grid {
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:1.5rem;
  }

  .stats-panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
  }

  .stats-panel h3 {
    font-family: var(--font-head);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 1rem;
  }

  .cat-bar-item {
    display:flex; align-items:center; gap:0.75rem;
    margin-bottom: 0.75rem;
  }

  .cat-bar-item .cat-name {
    font-size: 0.8rem;
    color: var(--text2);
    min-width: 100px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .cat-bar-item .bar-track {
    flex:1; height:6px;
    background: var(--bg3);
    border-radius:3px; overflow:hidden;
  }

  .cat-bar-item .bar-fill {
    height:100%;
    border-radius:3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    transition: width 0.6s ease;
  }

  .cat-bar-item .bar-val {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    color: var(--text3);
    min-width:35px;
    text-align:right;
  }

  /* Chart area */
  .chart-area { height:160px; position:relative; margin-top:0.5rem; }

  .score-dist {
    display:flex; align-items:flex-end; gap:6px;
    height:100%;
  }

  .score-dist .bar-col {
    flex:1; display:flex; flex-direction:column;
    align-items:center; gap:4px;
    height:100%;
    justify-content:flex-end;
  }

  .score-dist .bar-col .b {
    width:100%;
    background: linear-gradient(0deg, var(--accent2), var(--accent));
    border-radius: 3px 3px 0 0;
    transition: height 0.6s ease;
    min-height:2px;
  }

  .score-dist .bar-col .bl {
    font-family: var(--font-mono);
    font-size: 0.55rem;
    color: var(--text3);
  }

  /* ===== WAITLIST ===== */
  .waitlist-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap:1rem;
  }

  .wait-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow:hidden;
    transition: all 0.25s;
    cursor:pointer;
  }

  .wait-card:hover {
    border-color: var(--accent2);
    box-shadow: 0 6px 25px rgba(124,58,237,0.15);
    transform: translateY(-3px);
  }

  .wait-card .wc-cover {
    height:100px; background: var(--bg3);
    overflow:hidden; position:relative;
  }

  .wait-card .wc-cover img {
    width:100%; height:100%; object-fit:cover;
    filter: saturate(0.6) brightness(0.7);
  }

  .wait-card .wc-priority {
    position:absolute; top:8px; right:8px;
    font-family: var(--font-mono);
    font-size:0.55rem; letter-spacing:1px;
    text-transform:uppercase;
    padding: 2px 7px; border-radius:3px;
  }

  .pri-high { background:rgba(239,68,68,0.25); color:var(--red); border:1px solid rgba(239,68,68,0.4); }
  .pri-med { background:rgba(245,158,11,0.2); color:var(--orange); border:1px solid rgba(245,158,11,0.3); }
  .pri-low { background:rgba(71,85,105,0.4); color:var(--text3); border:1px solid var(--border); }

  .wait-card .wc-body { padding:0.85rem 1rem; }

  .wait-card .wc-title {
    font-family: var(--font-head);
    font-size:0.95rem; font-weight:600;
    margin-bottom:0.3rem;
  }

  .wait-card .wc-meta {
    font-size:0.72rem; color: var(--text3);
    display:flex; gap:0.75rem; flex-wrap:wrap;
  }

  .wait-card .wc-actions {
    display:flex; gap:0.5rem; margin-top:0.75rem;
  }

  .btn-sm {
    font-family: var(--font-head);
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 0.3rem 0.75rem;
    border-radius: 4px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-sm-play {
    background: rgba(34,197,94,0.15);
    color: var(--green);
    border: 1px solid rgba(34,197,94,0.3);
  }

  .btn-sm-play:hover { background: rgba(34,197,94,0.25); }

  .btn-sm-del {
    background: transparent;
    color: var(--text3);
    border: 1px solid var(--border);
  }

  .btn-sm-del:hover { color: var(--red); border-color: rgba(239,68,68,0.3); }

  /* ===== GAME DETAIL MODAL ===== */

    width:100%; height:200px;

  .detail-cover::after {
    content:'';
    position:absolute; inset:0;
    background: linear-gradient(0deg, var(--bg2) 0%, transparent 60%);
  }

  .detail-cover .dc-title {
    position:absolute; bottom:1rem; left:1rem; right:1rem;
    z-index:1;
    font-family: var(--font-head);
    font-size:1.5rem; font-weight:700;

  .detail-grid {
    display:grid; grid-template-columns:1fr 1fr;
    gap:0.75rem; margin-bottom:1rem;
  }

  .detail-item .di-label {
    font-family: var(--font-mono);
    font-size:0.6rem; color:var(--text3);
    text-transform:uppercase; letter-spacing:2px;
    margin-bottom:3px;
  }

  .detail-item .di-val {
    font-size:0.9rem; color:var(--text);
  }

  .review-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius:6px; padding:0.85rem 1rem;
    font-size:0.85rem; color:var(--text2);
    line-height:1.6; font-style:italic;
    margin-bottom:1rem;
  }

  /* ===== LOADING / SPINNER ===== */
  .spinner {
    display:inline-block;
    width:16px; height:16px;
    border:2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius:50%;
    animation: spin 0.6s linear infinite;
  }

  @keyframes spin { to { transform:rotate(360deg); } }

  .searching-indicator {
    display:flex; align-items:center; gap:0.5rem;
    font-size:0.8rem; color:var(--text3);
    padding: 0.5rem 0;
  }

  /* ===== EMPTY STATES ===== */
  .empty-state {
    text-align:center; padding:4rem 2rem;
    color: var(--text3);
  }

  .empty-state .es-icon { font-size:4rem; margin-bottom:1rem; opacity:0.3; }

  .empty-state .es-title {
    font-family: var(--font-head);
    font-size:1.1rem; font-weight:600;
    letter-spacing:2px; text-transform:uppercase;
    color: var(--text2); margin-bottom:0.5rem;
  }

  .empty-state .es-sub { font-size:0.85rem; }

  /* ===== RECENT ACTIVITY ===== */
  .activity-list { display:flex; flex-direction:column; gap:0.6rem; }

  .activity-item {
    display:flex; gap:0.75rem; align-items:center;
    padding: 0.6rem 0.75rem;
    background: var(--bg3);
    border-radius:6px;
    border: 1px solid var(--border);
    font-size:0.8rem;
  }

  .activity-item .ai-icon { font-size:1rem; flex-shrink:0; }

  .activity-item .ai-text { flex:1; color:var(--text2); }

  .activity-item .ai-text strong { color:var(--text); }

  .activity-item .ai-time {
    font-family: var(--font-mono);
    font-size:0.65rem; color: var(--text3);
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width:900px) {
    .dash-hero { grid-template-columns:1fr 1fr; }
    .dash-grid { grid-template-columns:1fr; }
    .stats-grid { grid-template-columns:1fr; }
  }

  @media (max-width:600px) {
    header { padding:0 1rem; }
    .page { padding: 1rem; }
    nav { display:none; }
    .dash-hero { grid-template-columns:1fr 1fr; }
    .games-grid { grid-template-columns:1fr 1fr; }

  /* ===== TOAST ===== */
  .toast-container { position:fixed; bottom:1.5rem; right:1.5rem; z-index:1000; display:flex; flex-direction:column; gap:0.5rem; }

  .toast {
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius:8px;
    padding:0.75rem 1.1rem;
    font-size:0.85rem;
    min-width:250px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
    animation: toastIn 0.3s ease;
    display:flex; align-items:center; gap:0.6rem;
  }

  @keyframes toastIn { from{transform:translateX(50px);opacity:0} to{transform:translateX(0);opacity:1} }

  .toast.success { border-left:3px solid var(--green); }
  .toast.error { border-left:3px solid var(--red); }
  .toast.info { border-left:3px solid var(--accent); }

  /* ===== FILTER BAR ===== */
  .filter-bar {
    display:flex; gap:0.75rem; margin-bottom:1.5rem;

  }

  .tab-btn:hover { color:var(--text2); }

  /* Highlight row */
  .highlight-box {

  /* ===== PAGE HEADER ===== */
  .page-header {
    display:flex; justify-content:space-between; align-items:flex-end;

</style>
</head>

<script>
// =================== DATA ===================
let games = JSON.parse(localStorage.getItem('gbx_games') || '[]');
let waitlist = JSON.parse(localStorage.getItem('gbx_wait') || '[]');
let activity = JSON.parse(localStorage.getItem('gbx_activity') || '[]');
let currentRating = 0;
let searchTimer = null;
let wSearchTimer = null;

function save() {
  localStorage.setItem('gbx_games', JSON.stringify(games));
  localStorage.setItem('gbx_wait', JSON.stringify(waitlist));
  localStorage.setItem('gbx_activity', JSON.stringify(activity));
}

function addActivity(icon, text) {
  activity.unshift({ icon, text, time: new Date().toISOString() });
  activity = activity.slice(0, 20);
}

// =================== NAVIGATION ===================
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
  renderPage(id);
}

function renderPage(id) {
  if (id === 'dashboard') renderDashboard();
  if (id === 'games') renderGames();
  if (id === 'ranking') renderRanking();
  if (id === 'stats') renderStats();
  if (id === 'waitlist') renderWaitlist();
}

// =================== STAR RATING ===================
function buildStars(container, currentVal, onSelect) {
  container.innerHTML = '';
  const valSpan = document.createElement('span');
  valSpan.className = 'rating-val';
  valSpan.id = container.id === 'starInput' ? 'ratingVal' : 'ratingValX';
  valSpan.textContent = currentVal > 0 ? currentVal.toFixed(1) : '—';
  container.appendChild(valSpan);

  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'star-btn' + (i <= currentVal ? ' active' : '');
    btn.textContent = '★';
    btn.dataset.val = i;
    btn.addEventListener('mouseenter', () => highlight(container, i));
    btn.addEventListener('mouseleave', () => highlight(container, currentRating));
    btn.addEventListener('click', () => {
      currentRating = i;
      valSpan.textContent = i + '.0';
      highlight(container, i);
      if (onSelect) onSelect(i);
    });
    container.appendChild(btn);
  }
}

function highlight(container, val) {
  container.querySelectorAll('.star-btn').forEach((b, i) => {
    b.classList.toggle('active', i < val);
  });
}

// =================== STEAM SEARCH ===================
async function searchSteam(query, resultEl, statusEl, fillFn) {
  if (!query || query.length < 2) { resultEl.innerHTML = ''; statusEl.innerHTML = ''; return; }
  statusEl.innerHTML = '<div class="searching-indicator"><div class="spinner"></div> Buscando na Steam...</div>';
  resultEl.innerHTML = '';

  try {
    // Use Steam's storefront search (CORS proxy via allorigins)
    const url = `https://store.steampowered.com/api/storesearch/?term=${encodeURIComponent(query)}&l=portuguese&cc=BR`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy);
    const data = await res.json();
    const parsed = JSON.parse(data.contents);
    const items = (parsed.items || []).slice(0, 3);

    statusEl.innerHTML = '';
    if (!items.length) { resultEl.innerHTML = '<div style="font-size:0.8rem;color:var(--text3);padding:0.4rem 0;">Nenhum resultado encontrado.</div>'; return; }

    items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'steam-result';
      div.style.cursor = 'pointer';
      div.style.marginBottom = '0.5rem';

      const price = item.price ? (item.price.final / 100).toLocaleString('pt-BR', {style:'currency',currency:'BRL'}) : 'Grátis ou N/A';
      const metascore = item.metascore || null;
      const platforms = [item.platforms?.windows && 'Windows', item.platforms?.linux && 'Linux', item.platforms?.mac && 'Mac'].filter(Boolean).join(', ');

      div.innerHTML = `
        <img src="https://cdn.akamai.steamstatic.com/steam/apps/${item.id}/capsule_sm_120.jpg" alt="" onerror="this.style.display='none'">
        <div>
          <div class="sr-title">${item.name}</div>
          <div class="sr-meta">
            App ID: <code style="font-family:var(--font-mono);color:var(--accent)">${item.id}</code>
            ${metascore ? ` · Metascore: <strong style="color:var(--green)">${metascore}</strong>` : ''}
            · ${price}
            ${platforms ? `<br>${platforms}` : ''}
          </div>
          <div class="sr-tags">${(item.streamingvideo ? ['Streaming'] : []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
        </div>
        <div style="margin-left:auto;font-size:0.7rem;color:var(--accent);font-family:var(--font-mono);white-space:nowrap;align-self:center;">Usar este ▶</div>
      `;
      div.addEventListener('click', () => fillFn(item));
      resultEl.appendChild(div);
    });
  } catch (e) {
    statusEl.innerHTML = '';
    resultEl.innerHTML = '<div style="font-size:0.75rem;color:var(--text3);padding:0.3rem 0;">Falha ao contatar a Steam. Preencha manualmente.</div>';
  }
}

function debounceSearch() {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    const q = document.getElementById('steamSearch').value;
    searchSteam(q, document.getElementById('steamResult'), document.getElementById('steamSearchStatus'), fillGameFromSteam);
  }, 600);
}

function debounceWaitSearch() {
  clearTimeout(wSearchTimer);
  wSearchTimer = setTimeout(() => {
    const q = document.getElementById('wSteamSearch').value;
    searchSteam(q, document.getElementById('wSteamResult'), document.getElementById('wSteamStatus'), fillWaitFromSteam);
  }, 600);
}

function fillGameFromSteam(item) {
  document.getElementById('gName').value = item.name;
  document.getElementById('gSteamId').value = item.id;
  document.getElementById('gCover').value = `https://cdn.akamai.steamstatic.com/steam/apps/${item.id}/header.jpg`;
  document.getElementById('steamResult').innerHTML = `<div style="font-size:0.75rem;color:var(--green);padding:0.3rem 0;">✓ ${item.name} selecionado!</div>`;
  document.getElementById('steamSearch').value = '';
  toast('Dados da Steam carregados!', 'success');
  fetchSteamDetails(item.id);
}

function fillWaitFromSteam(item) {
  document.getElementById('wName').value = item.name;
  document.getElementById('wCover').value = `https://cdn.akamai.steamstatic.com/steam/apps/${item.id}/header.jpg`;

async function fetchSteamDetails(appId) {
  try {
    const url = `https://store.steampowered.com/api/appdetails?appids=${appId}&l=portuguese&cc=BR`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy);
    const raw = await res.json();
    const data = JSON.parse(raw.contents);
    const app = data[appId]?.data;
    if (!app) return;

    const genres = (app.genres || []).map(g => g.description).join(', ');
    if (genres) document.getElementById('gCat').value = genres;

    const hltb = '';
    const desc = app.short_description || '';
  } catch (e) {}
}

async function fetchSteamCatForWait(appId) {
  try {
    const url = `https://store.steampowered.com/api/appdetails?appids=${appId}&l=portuguese&cc=BR`;
    const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
    const res = await fetch(proxy);
    const raw = await res.json();
    const data = JSON.parse(raw.contents);
    const app = data[appId]?.data;
    if (!app) return;
    const genres = (app.genres || []).map(g => g.description).join(', ');
    if (genres) document.getElementById('wCat').value = genres;

    // Estimated hours from HLTB average (fallback to app playtime if available)
    const playtime = app.average_playtime;
    if (playtime && playtime > 0 && !document.getElementById('wHours').value) {
      document.getElementById('wHours').value = Math.round(playtime / 60);
    }
  } catch(e) {}
}

// =================== COMPLETION BAR COLOR ===================
function completionColor(pct) {
  if (pct >= 100) return '#ffd700';
  if (pct >= 75) return '#22c55e';
  if (pct >= 40) return '#00d4ff';
  if (pct >= 10) return '#f97316';
  return '#ef4444';
}

// =================== STARS DISPLAY ===================
function starsHtml(score) {
  if (!score) return '<span style="color:var(--text3);font-size:0.75rem;">Sem nota</span>';
  let html = '<div class="stars-display">';
  for (let i = 1; i <= 10; i++) {
    const cl = i <= score ? 'filled' : '';
    html += `<span class="star ${cl}">★</span>`;
  }
  html += `</div>`;
  return html;
}

// =================== SAVE/DELETE ===================
function saveGame() {
  const name = document.getElementById('gName').value.trim();
  if (!name) { toast('Nome é obrigatório!', 'error'); return; }

  const editId = document.getElementById('gEditId').value;
  const g = {
    id: editId || Date.now().toString(),
    name,
    category: document.getElementById('gCat').value.trim(),
    hours: parseFloat(document.getElementById('gHours').value) || 0,
    completion: parseFloat(document.getElementById('gCompletion').value) || 0,
    status: document.getElementById('gStatus').value,
    platform: document.getElementById('gPlatform').value.trim(),
    score: currentRating,
    review: document.getElementById('gReview').value.trim(),
    cover: document.getElementById('gCover').value.trim(),
    steamId: document.getElementById('gSteamId').value.trim(),
    date: editId ? (games.find(x=>x.id===editId)?.date || new Date().toISOString()) : new Date().toISOString()
  };

  if (editId) {
    const idx = games.findIndex(x => x.id === editId);
    games[idx] = g;
    addActivity('✏️', `Editou <strong>${name}</strong>`);
    toast('Jogo atualizado!', 'success');
  } else {
    games.unshift(g);
    addActivity('🎮', `Adicionou <strong>${name}</strong> com nota ${currentRating > 0 ? currentRating + '/10' : 'sem nota'}`);
    toast('Jogo adicionado!', 'success');
  }

  save();
  closeModal('addModal');
  updateCatFilters();
  renderPage(document.querySelector('nav button.active')?.textContent?.toLowerCase() || 'dashboard');
}

function deleteGame() {
  const id = document.getElementById('gEditId').value;
  const g = games.find(x => x.id === id);
  if (!g) return;
  if (!confirm(`Remover "${g.name}"?`)) return;
  games = games.filter(x => x.id !== id);
  addActivity('🗑️', `Removeu <strong>${g.name}</strong>`);
  save();
  toast('Jogo removido.', 'info');
  closeModal('addModal');
  renderPage(document.querySelector('nav button.active')?.textContent?.toLowerCase() || 'dashboard');
}

    ? (games.filter(g => g.score > 0).reduce((s, g) => s + g.score, 0) / games.filter(g => g.score > 0).length).toFixed(1)
    : '—';
  const completed = games.filter(g => g.status === 'completed').length;
  const waitHours = waitlist.reduce((s, w) => s + (w.hours || 0), 0);

  document.getElementById('dashStats').innerHTML = `
    <div class="stat-card">
      <div class="label">Jogos registrados</div>
      <div class="value">${games.length}</div>
      <div class="sub">${completed} concluídos</div>
      <div class="icon">🎮</div>
    </div>
    <div class="stat-card">
      <div class="label">Horas jogadas</div>
      <div class="value">${totalHours.toFixed(0)}</div>
      <div class="sub">${(totalHours / 24).toFixed(1)} dias de jogo</div>
      <div class="icon">⏱️</div>
    </div>
    <div class="stat-card">
      <div class="label">Nota média</div>
      <div class="value" style="color:var(--gold)">${avgScore}</div>
      <div class="sub">de 10 estrelas</div>
      <div class="icon">⭐</div>
    </div>
    <div class="stat-card">
      <div class="label">Lista de espera</div>
      <div class="value" style="color:var(--accent2)">${waitlist.length}</div>
      <div class="sub">~${waitHours}h estimadas</div>
      <div class="icon">📋</div>
    </div>
  `;

  // Recent games (last 6)
  const recent = games.slice(0, 6);
  const rg = document.getElementById('dashRecentGames');
  if (!recent.length) {
    rg.innerHTML = '<div class="empty-state"><div class="es-icon">🎮</div><div class="es-title">Nenhum jogo ainda</div><div class="es-sub">Clique em "+ Adicionar Jogo" para começar</div></div>';
  } else {
    rg.innerHTML = recent.map(g => gameCardHtml(g)).join('');
  }

  // Activity
  const act = document.getElementById('dashActivity');
  if (!activity.length) {
    act.innerHTML = '<div style="color:var(--text3);font-size:0.8rem;padding:1rem 0;">Nenhuma atividade ainda.</div>';
  } else {
    act.innerHTML = activity.slice(0, 8).map(a => {
      const d = new Date(a.time);
      const rel = timeAgo(d);
      return `<div class="activity-item">
        <span class="ai-icon">${a.icon}</span>
        <span class="ai-text">${a.text}</span>
        <span class="ai-time">${rel}</span>
      </div>`;
    }).join('');
  }
}

function timeAgo(date) {
  const secs = Math.floor((Date.now() - date.getTime()) / 1000);
  if (secs < 60) return 'agora';
  if (secs < 3600) return `${Math.floor(secs/60)}m`;
  if (secs < 86400) return `${Math.floor(secs/3600)}h`;
  return `${Math.floor(secs/86400)}d`;
}

// =================== GAME CARD HTML ===================
function gameCardHtml(g) {
  const statusLabel = {completed:'Concluído', playing:'Jogando', dropped:'Abandonado'}[g.status] || '';
  const statusClass = {completed:'badge-completed', playing:'badge-playing', dropped:'badge-dropped'}[g.status] || '';
  const color = completionColor(g.completion);
  return `
  <div class="game-card" onclick="showDetail('${g.id}')">
    <div class="cover">
      ${g.cover
        ? `<img src="${g.cover}" alt="${g.name}" onerror="this.parentElement.innerHTML='<div class=cover-fallback>🎮</div>'">`
        : `<div class="cover-fallback">🎮</div>`}
      <span class="badge-status ${statusClass}">${statusLabel}</span>
    </div>
    <div class="info">
      <div class="title" title="${g.name}">${g.name}</div>
      <div class="meta">
        <span>${g.category || '—'}</span>
        <span style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text3)">${g.hours || 0}h</span>
      </div>
      ${starsHtml(g.score)}
      <div class="completion-bar-wrap">
        <span class="completion-label">${g.completion || 0}%</span>
        <div class="completion-bar-bg">
          <div class="completion-bar" style="width:${g.completion || 0}%;background:${color}"></div>
        </div>
      </div>
    </div>
  </div>`;
}

// =================== RENDER GAMES ===================
function renderGames() {
  const status = document.getElementById('filterStatus').value;
  const cat = document.getElementById('filterCat').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  const sort = document.getElementById('sortGames').value;

  let list = games.filter(g =>
    (!status || g.status === status) &&
    (!cat || g.category === cat) &&
    (!search || g.name.toLowerCase().includes(search))
  );

  if (sort === 'score') list.sort((a,b) => (b.score||0)-(a.score||0));
  else if (sort === 'hours') list.sort((a,b) => (b.hours||0)-(a.hours||0));
  else if (sort === 'completion') list.sort((a,b) => (b.completion||0)-(a.completion||0));
  else if (sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));
  else list.sort((a,b) => new Date(b.date)-new Date(a.date));

  document.getElementById('gamesCount').textContent = `${list.length} jogo${list.length!==1?'s':''} encontrado${list.length!==1?'s':''}`;

  const grid = document.getElementById('gamesGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="es-icon">🔍</div><div class="es-title">Nenhum jogo encontrado</div><div class="es-sub">Tente ajustar os filtros ou adicione novos jogos</div></div>';
    return;
  }
  grid.innerHTML = list.map(g => gameCardHtml(g)).join('');
}

// =================== RENDER RANKING ===================
function renderRanking() {
  const catFilter = document.getElementById('rankFilter').value;
  let list = games.filter(g => g.score > 0 && (!catFilter || g.category === catFilter));
  list.sort((a,b) => b.score - a.score || b.hours - a.hours);

  const el = document.getElementById('rankList');
  if (!list.length) {
    el.innerHTML = '<div class="empty-state"><div class="es-icon">🏆</div><div class="es-title">Sem jogos com nota</div><div class="es-sub">Adicione notas aos seus jogos para ver o ranking</div></div>';
    return;
  }

  el.innerHTML = list.map((g, i) => {
    const rank = i + 1;
    const cls = rank === 1 ? 'top-1' : rank === 2 ? 'top-2' : rank === 3 ? 'top-3' : '';
    const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
    return `
    <div class="rank-item ${cls}" onclick="showDetail('${g.id}')">
      <div class="rank-num">${medal}</div>
      <div class="rank-cover">
        ${g.cover ? `<img src="${g.cover}" alt="" onerror="this.style.display='none'">` : ''}
      </div>
      <div class="rank-info">
        <div class="name">${g.name}</div>
        <div class="cat">${g.category || '—'} · ${g.platform || '—'}</div>
      </div>
      <div class="rank-score">${g.score}<span style="font-size:0.75rem;color:var(--text3)">/10</span></div>
      <div class="rank-hours">${g.hours || 0}h<br><span style="font-size:0.6rem;color:var(--text3)">${g.completion || 0}%</span></div>
    </div>`;
  }).join('');
}

// =================== RENDER STATS ===================
function renderStats() {
  if (!games.length) {
    document.getElementById('statsGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="es-icon">📊</div><div class="es-title">Sem dados ainda</div><div class="es-sub">Adicione jogos para ver estatísticas</div></div>';
    return;
  }

  // Category stats
  const catMap = {};
  games.forEach(g => {
    const c = g.category || 'Sem categoria';
    if (!catMap[c]) catMap[c] = { count:0, hours:0, scores:[], completion:[] };
    catMap[c].count++;
    catMap[c].hours += g.hours || 0;
    if (g.score > 0) catMap[c].scores.push(g.score);
    if (g.completion > 0) catMap[c].completion.push(g.completion);
  });

  const cats = Object.entries(catMap).sort((a,b) => b[1].count - a[1].count);
  const maxCount = Math.max(...cats.map(c => c[1].count));
  const maxHours = Math.max(...cats.map(c => c[1].hours));

  // Score distribution
  const scoreDist = Array(10).fill(0);
  games.filter(g => g.score > 0).forEach(g => scoreDist[g.score-1]++);
  const maxD = Math.max(...scoreDist, 1);

  // Status breakdown
  const statusCount = { completed:0, playing:0, dropped:0 };
  games.forEach(g => { if (statusCount[g.status] !== undefined) statusCount[g.status]++; });

  const totalHours = games.reduce((s,g) => s + (g.hours||0), 0);
  const avgCompletion = games.length ? (games.reduce((s,g) => s + (g.completion||0), 0) / games.length).toFixed(1) : 0;

    </div>

      <h3>Status dos Jogos</h3>

        ${[['completed','Concluídos','var(--green)'],['playing','Jogando','var(--accent)'],['dropped','Abandonados','var(--red)']].map(([k,l,c]) => `
          <div class="cat-bar-item">
            <div class="cat-name" style="color:${c}">${l}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${games.length?statusCount[k]/games.length*100:0}%;background:${c}"></div></div>
            <div class="bar-val">${statusCount[k]}</div>
          </div>`).join('')}
        <div style="margin-top:0.5rem;padding-top:0.75rem;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
          <div><div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text3);margin-bottom:2px;">TOTAL HORAS</div><div style="font-family:var(--font-head);font-size:1.2rem;color:var(--accent)">${totalHours.toFixed(0)}h</div></div>
          <div><div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text3);margin-bottom:2px;">% MÉDIO</div><div style="font-family:var(--font-head);font-size:1.2rem;color:var(--accent)">${avgCompletion}%</div></div>
        </div>
      </div>
    </div>

    <div class="stats-panel">
      <h3>Categorias Preferidas (por jogos)</h3>
      ${cats.slice(0,6).map(([c,d]) => `

        </div>`).join('')}
    </div>

    <div class="stats-panel">
      <h3>Horas por Categoria</h3>
      ${cats.slice(0,6).map(([c,d]) => `
        <div class="cat-bar-item">
          <div class="cat-name">${c}</div>

        ${mostPlayed ? `<div class="highlight-box">
          <div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text3);margin-bottom:4px;">MAIS JOGADO</div>
          <div style="font-family:var(--font-head);font-size:1rem;font-weight:600;">${mostPlayed.name}</div>
          <div style="font-size:0.75rem;color:var(--accent);">⏱ ${mostPlayed.hours}h jogadas</div>
        </div>` : ''}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
          <div style="background:var(--bg3);border-radius:6px;padding:0.6rem;border:1px solid var(--border);text-align:center;">
            <div style="font-family:var(--font-mono);font-size:0.55rem;color:var(--text3);">TOTAL DIAS</div>
            <div style="font-family:var(--font-head);font-size:1.2rem;color:var(--orange)">${(totalHours/24).toFixed(1)}</div>
          </div>
          <div style="background:var(--bg3);border-radius:6px;padding:0.6rem;border:1px solid var(--border);text-align:center;">
            <div style="font-family:var(--font-mono);font-size:0.55rem;color:var(--text3);">CATEGORIAS</div>
            <div style="font-family:var(--font-head);font-size:1.2rem;color:var(--accent2)">${cats.length}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

// =================== RENDER WAITLIST ===================
function renderWaitlist() {
  const pri = document.getElementById('waitPriFilter').value;
  const cat = document.getElementById('waitCatFilter').value;
  const search = document.getElementById('waitSearch').value.toLowerCase();

  let list = waitlist.filter(w =>
    (!pri || w.priority === pri) &&
    (!cat || w.category === cat) &&
    (!search || w.name.toLowerCase().includes(search))
  );

  document.getElementById('waitCount').textContent = `${waitlist.length} jogo${waitlist.length!==1?'s':''} na fila`;

  // Wait stats
  const totalWaitH = waitlist.reduce((s,w) => s + (w.hours||0), 0);
  const highPri = waitlist.filter(w=>w.priority==='high').length;

  const catWaitMap = {};
  waitlist.forEach(w => {
    const c = w.category || 'Sem categoria';
    if (!catWaitMap[c]) catWaitMap[c] = { count:0, hours:0 };
    catWaitMap[c].count++;
    catWaitMap[c].hours += w.hours || 0;
  });

  const wStats = document.getElementById('waitStats');
  if (waitlist.length) {
    wStats.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1rem;">
        <div class="stat-card"><div class="label">Total na fila</div><div class="value" style="color:var(--accent2)">${waitlist.length}</div><div class="icon">📋</div></div>
        <div class="stat-card"><div class="label">Horas estimadas</div><div class="value">${totalWaitH}<span style="font-size:1rem">h</span></div><div class="sub">${(totalWaitH/24).toFixed(1)} dias</div><div class="icon">⏳</div></div>
        <div class="stat-card"><div class="label">Alta prioridade</div><div class="value" style="color:var(--red)">${highPri}</div><div class="icon">🔥</div></div>
        <div class="stat-card"><div class="label">Categorias</div><div class="value" style="color:var(--accent3)">${Object.keys(catWaitMap).length}</div><div class="icon">🗂️</div></div>
      </div>
      ${Object.keys(catWaitMap).length > 1 ? `
      <div class="stats-panel" style="margin-bottom:1rem;">
        <h3>Horas por categoria (lista de espera)</h3>
        ${Object.entries(catWaitMap).sort((a,b)=>b[1].hours-a[1].hours).map(([c,d]) => {
          const max = Math.max(...Object.values(catWaitMap).map(x=>x.hours), 1);
          return `<div class="cat-bar-item">
            <div class="cat-name">${c}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${(d.hours/max)*100}%;background:linear-gradient(90deg,var(--accent2),var(--accent3))"></div></div>
            <div class="bar-val">${d.hours}h</div>
          </div>`;
        }).join('')}
      </div>` : ''}
    `;
  } else {
    wStats.innerHTML = '';
  }

  const grid = document.getElementById('waitGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="es-icon">📋</div><div class="es-title">Lista vazia</div><div class="es-sub">Adicione jogos que você quer jogar em breve</div></div>';
    return;
  }

  const priOrder = { high:0, med:1, low:2 };
  list.sort((a,b) => priOrder[a.priority] - priOrder[b.priority]);

  grid.innerHTML = list.map(w => {
    const priLabel = { high:'Alta 🔥', med:'Média', low:'Baixa' }[w.priority];
    const priClass = { high:'pri-high', med:'pri-med', low:'pri-low' }[w.priority];
    return `
    <div class="wait-card">
      <div class="wc-cover">
        ${w.cover ? `<img src="${w.cover}" alt="">` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:2.5rem;background:var(--bg4)">🎮</div>`}
        <span class="wc-priority ${priClass}">${priLabel}</span>
      </div>
      <div class="wc-body">
        <div class="wc-title">${w.name}</div>
        <div class="wc-meta">
          <span>${w.category || '—'}</span>
          <span>~${w.hours || '?'}h</span>
        </div>
        ${w.note ? `<div style="font-size:0.75rem;color:var(--text3);margin-top:0.4rem;font-style:italic;">${w.note}</div>` : ''}
        <div class="wc-actions">
          <button class="btn-sm btn-sm-play" onclick="moveToPlayed('${w.id}')">▶ Jogar agora</button>
          <button class="btn-sm btn-sm-del" onclick="openAddWaitModal('${w.id}')">✏ Editar</button>
          <button class="btn-sm btn-sm-del" onclick="deleteWaitDirect('${w.id}')">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function deleteWaitDirect(id) {
  const w = waitlist.find(x => x.id === id);
  if (!w) return;
  if (!confirm(`Remover "${w.name}"?`)) return;
  waitlist = waitlist.filter(x => x.id !== id);
  save();
  toast('Removido da lista.', 'info');
  renderWaitlist();
}

// =================== DETAIL MODAL ===================
function showDetail(id) {
  const g = games.find(x => x.id === id);
  if (!g) return;
  const color = completionColor(g.completion);

  document.getElementById('detailBody').innerHTML = `
    <div class="detail-cover">
      ${g.cover ? `<img src="${g.cover}" alt="${g.name}">` : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem;background:var(--bg4)">🎮</div>`}
      <div class="dc-title">${g.name}</div>
    </div>

    <div class="detail-grid">
      <div class="detail-item"><div class="di-label">Categoria</div><div class="di-val">${g.category || '—'}</div></div>
      <div class="detail-item"><div class="di-label">Plataforma</div><div class="di-val">${g.platform || '—'}</div></div>
      <div class="detail-item"><div class="di-label">Horas Jogadas</div><div class="di-val" style="color:var(--accent)">${g.hours || 0}h</div></div>
      <div class="detail-item"><div class="di-label">Status</div><div class="di-val">${{completed:'✅ Concluído',playing:'🎮 Jogando',dropped:'❌ Abandonado'}[g.status]||'—'}</div></div>
    </div>

    <div style="margin-bottom:1rem;">
      <div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;">Nota</div>
      ${starsHtml(g.score)}
      ${g.score ? `<span style="font-family:var(--font-head);font-size:1.5rem;color:var(--gold);margin-left:0.5rem;">${g.score}/10</span>` : ''}
    </div>

    <div style="margin-bottom:1rem;">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px;">
        <span style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text3);text-transform:uppercase;letter-spacing:2px;">Conclusão</span>
        <span style="font-family:var(--font-mono);font-size:0.8rem;color:${color};font-weight:600">${g.completion || 0}%</span>
      </div>
      <div class="completion-bar-bg" style="height:8px">
        <div class="completion-bar" style="width:${g.completion||0}%;background:${color};height:8px"></div>
      </div>
    </div>

    ${g.review ? `<div class="review-box">"${g.review}"</div>` : ''}

    ${g.steamId ? `<div style="margin-bottom:1rem;"><a href="https://store.steampowered.com/app/${g.steamId}" target="_blank" style="font-size:0.78rem;color:var(--accent);text-decoration:none;font-family:var(--font-mono);">🔗 Ver na Steam ↗</a></div>` : ''}

    <div class="form-actions" style="padding-top:0.75rem;margin-top:0.5rem;">
      <button class="btn btn-ghost" onclick="closeModal('detailModal')">Fechar</button>
      <button class="btn btn-primary" onclick="closeModal('detailModal');openAddModal('${g.id}')">✏ Editar</button>
    </div>
  `;
  document.getElementById('detailModal').classList.add('open');
}

// =================== CATEGORY FILTERS ===================
function updateCatFilters() {
  const cats = [...new Set(games.map(g => g.category).filter(Boolean))].sort();
  const waitCats = [...new Set(waitlist.map(w => w.category).filter(Boolean))].sort();

  ['filterCat', 'rankFilter'].forEach(id => {
    const sel = document.getElementById(id);
    if (!sel) return;
    const val = sel.value;
    sel.innerHTML = `<option value="">Todas as categorias</option>` + cats.map(c => `<option value="${c}">${c}</option>`).join('');
    sel.value = val;
  });

  const wc = document.getElementById('waitCatFilter');
  if (wc) {
    wc.innerHTML = `<option value="">Todas as categorias</option>` + waitCats.map(c => `<option value="${c}">${c}</option>`).join('');
  }
}

// =================== TOAST ===================
function toast(msg, type = 'info') {
  const icons = { success:'✓', error:'✕', info:'ℹ' };
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${icons[type]}</span> ${msg}`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// Close modal on overlay click
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});
